name: Build

on:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: cd packages/selia && bun install
      - name: Build docs
        run: bun scripts/build-docs.ts
      - name: Build CLI
        run: cd packages/selia && bun run build
      - name: Build registry
        run: node packages/selia/dist/index.js build
